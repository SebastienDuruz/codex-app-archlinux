name: Arch Packaging Metadata

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-metadata:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
      - name: Checkout (bootstrap)
        uses: actions/checkout@v4

      - name: Install build tooling
        run: pacman -Sy --noconfirm --needed base-devel git pacman-contrib

      - name: Checkout (git mode)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git safety
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Prepare non-root build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Regenerate PKGBUILD checksums and .SRCINFO
        run: |
          su builder -c "cd '$GITHUB_WORKSPACE' && updpkgsums"
          su builder -c "cd '$GITHUB_WORKSPACE' && makepkg --printsrcinfo > .SRCINFO"

      - name: Check for metadata drift (PR)
        if: github.event_name == 'pull_request'
        run: |
          if ! git diff --quiet -- PKGBUILD .SRCINFO; then
            echo "PKGBUILD/.SRCINFO are out of sync." >&2
            echo "Run: updpkgsums && makepkg --printsrcinfo > .SRCINFO" >&2
            git --no-pager diff -- PKGBUILD .SRCINFO
            exit 1
          fi

      - name: Auto-commit metadata updates (push/workflow_dispatch)
        if: github.event_name != 'pull_request'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          if git diff --quiet -- PKGBUILD .SRCINFO; then
            echo "No metadata changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add PKGBUILD .SRCINFO
          git commit -m "chore: sync PKGBUILD checksums and .SRCINFO"
          git push origin "HEAD:${BRANCH_NAME}"
