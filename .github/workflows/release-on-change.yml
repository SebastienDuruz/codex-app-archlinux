name: Nightly Release on Codex DMG Change

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  DMG_URL: https://persistent.oaistatic.com/codex-app-prod/Codex.dmg

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Install build dependencies
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm --needed \
            base-devel \
            git \
            pacman-contrib \
            p7zip \
            libicns \
            nodejs \
            npm \
            electron39 \
            python \
            hicolor-icon-theme \
            xdg-utils \
            libarchive \
            curl

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git safety
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Prepare build user
        run: |
          set -euo pipefail
          id -u builder >/dev/null 2>&1 || useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Detect upstream DMG change
        id: detect
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          prev_hash=""
          if [[ -f .codex-dmg.sha256 ]]; then
            prev_hash="$(tr -d '[:space:]' < .codex-dmg.sha256)"
          fi

          tmp_dmg="$(mktemp)"
          trap 'rm -f "$tmp_dmg"' EXIT

          curl -fL --retry 3 --retry-delay 2 "$DMG_URL" -o "$tmp_dmg"
          new_hash="$(sha256sum "$tmp_dmg" | awk '{print $1}')"

          cp "$tmp_dmg" "$GITHUB_WORKSPACE/Codex.dmg"
          chown builder:builder "$GITHUB_WORKSPACE/Codex.dmg"
          chmod 0644 "$GITHUB_WORKSPACE/Codex.dmg"

          echo "dmg_hash=$new_hash" >> "$GITHUB_OUTPUT"

          if [[ -n "$prev_hash" && "$prev_hash" == "$new_hash" ]]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream DMG change detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            if [[ -z "$prev_hash" ]]; then
              echo "No previous DMG hash state found: release will proceed."
            else
              echo "Upstream DMG changed: ${prev_hash} -> ${new_hash}"
            fi
          fi

      - name: Stop when there is nothing to release
        if: steps.detect.outputs.changed != 'true'
        run: |
          echo "No release needed."
          exit 0

      - name: Compute next semantic version
        id: version
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"

          if [[ -z "$latest_tag" ]]; then
            current_pkgver="$(awk -F= '/^pkgver=/{print $2; exit}' PKGBUILD | tr -d "'\"[:space:]")"
            if [[ -z "$current_pkgver" ]]; then
              echo "Unable to read pkgver from PKGBUILD" >&2
              exit 1
            fi
            next_version="$current_pkgver"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"

            if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
              echo "Invalid semantic tag format: $latest_tag" >&2
              exit 1
            fi

            next_version="${major}.${minor}.$((patch + 1))"
          fi

          next_tag="v${next_version}"

          echo "next_version=$next_version" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Stop if tag already exists remotely
        working-directory: ${{ github.workspace }}
        env:
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${NEXT_TAG}" >/dev/null 2>&1; then
            echo "Tag already exists: ${NEXT_TAG}"
            exit 0
          fi

      - name: Apply release metadata
        working-directory: ${{ github.workspace }}
        env:
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          NEW_DMG_HASH: ${{ steps.detect.outputs.dmg_hash }}
        run: |
          set -euo pipefail

          sed -i -E "s/^pkgver=.*/pkgver=${NEXT_VERSION}/" PKGBUILD
          sed -i -E "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          printf '%s\n' "$NEW_DMG_HASH" > .codex-dmg.sha256

          su builder -c "cd '$GITHUB_WORKSPACE' && updpkgsums"
          su builder -c "cd '$GITHUB_WORKSPACE' && makepkg --printsrcinfo > .SRCINFO"

      - name: Commit release metadata
        working-directory: ${{ github.workspace }}
        env:
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add PKGBUILD .SRCINFO .codex-dmg.sha256

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "chore(release): bump version to ${NEXT_TAG#v}"
          git push origin HEAD:main

      - name: Create and push tag
        working-directory: ${{ github.workspace }}
        env:
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
        run: |
          set -euo pipefail
          git tag -a "${NEXT_TAG}" -m "Release ${NEXT_TAG}"
          git push origin "${NEXT_TAG}"

      - name: Build package
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          su builder -c "cd '$GITHUB_WORKSPACE' && makepkg -f --noconfirm"

      - name: Build portable executable artifact
        id: artifacts
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          PKG_FILE="$(su builder -c "cd '$GITHUB_WORKSPACE' && makepkg --packagelist | head -n1")"
          if [[ -z "$PKG_FILE" || ! -f "$PKG_FILE" ]]; then
            echo "Built package not found" >&2
            exit 1
          fi

          WORK_DIR="$(mktemp -d)"
          trap 'rm -rf "$WORK_DIR"' EXIT

          EXTRACT_DIR="${WORK_DIR}/pkgroot"
          PORTABLE_NAME="codex-app-linux-x86_64"
          PORTABLE_DIR="${WORK_DIR}/${PORTABLE_NAME}"

          mkdir -p "$EXTRACT_DIR" "$PORTABLE_DIR/bin" "$PORTABLE_DIR/lib"

          bsdtar -xpf "$PKG_FILE" -C "$EXTRACT_DIR"
          rm -f "$EXTRACT_DIR/.PKGINFO" "$EXTRACT_DIR/.BUILDINFO" "$EXTRACT_DIR/.MTREE"

          cp -a "$EXTRACT_DIR/usr/bin/codex-app" "$PORTABLE_DIR/bin/codex-app"
          cp -a "$EXTRACT_DIR/usr/lib/codex-app" "$PORTABLE_DIR/lib/codex-app"
          cp -a /usr/lib/electron39 "$PORTABLE_DIR/lib/electron39"

          cat > "${PORTABLE_DIR}/codex-app" <<'EOF_WRAPPER'
          #!/usr/bin/env bash
          set -euo pipefail
          HERE="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export CODEX_APPDIR="${HERE}/lib/codex-app"
          export CODEX_ELECTRON_PATH="${HERE}/lib/electron39/electron"
          exec "${HERE}/bin/codex-app" "$@"
          EOF_WRAPPER

          chmod +x "${PORTABLE_DIR}/codex-app"

          mkdir -p "$GITHUB_WORKSPACE/dist"
          ARCHIVE_FILE="$GITHUB_WORKSPACE/dist/${PORTABLE_NAME}.tar.gz"
          tar -C "$WORK_DIR" -czf "$ARCHIVE_FILE" "$PORTABLE_NAME"

          SHA_FILE="${ARCHIVE_FILE}.sha256"
          sha256sum "$ARCHIVE_FILE" > "$SHA_FILE"

          echo "pkg_file=$ARCHIVE_FILE" >> "$GITHUB_OUTPUT"
          echo "sha_file=$SHA_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-executable-${{ steps.version.outputs.next_tag }}
          path: |
            ${{ steps.artifacts.outputs.pkg_file }}
            ${{ steps.artifacts.outputs.sha_file }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          name: Release ${{ steps.version.outputs.next_tag }}
          files: |
            ${{ steps.artifacts.outputs.pkg_file }}
            ${{ steps.artifacts.outputs.sha_file }}
          generate_release_notes: true
