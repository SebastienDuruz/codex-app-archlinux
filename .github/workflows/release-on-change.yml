name: Nightly Release on Codex DMG Change

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  DMG_URL: https://persistent.oaistatic.com/codex-app-prod/Codex.dmg
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Install build dependencies
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm --needed \
            base-devel \
            git \
            pacman-contrib \
            p7zip \
            libicns \
            nodejs \
            npm \
            electron39 \
            python \
            hicolor-icon-theme \
            xdg-utils \
            libarchive \
            curl

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure git safety
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Prepare build user
        run: |
          set -euo pipefail
          id -u builder >/dev/null 2>&1 || useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Detect upstream DMG change
        id: detect
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          prev_codex_version=""
          if [[ -f .codex-version ]]; then
            prev_codex_version="$(tr -d '[:space:]' < .codex-version)"
          fi

          prev_hash=""
          if [[ -f .codex-dmg.sha256 ]]; then
            prev_hash="$(tr -d '[:space:]' < .codex-dmg.sha256)"
          fi

          tmp_dmg="$(mktemp)"
          tmp_extract_dir="$(mktemp -d)"
          trap 'rm -f "$tmp_dmg"; rm -rf "$tmp_extract_dir"' EXIT

          curl -fL --retry 3 --retry-delay 2 "$DMG_URL" -o "$tmp_dmg"
          new_hash="$(sha256sum "$tmp_dmg" | awk '{print $1}')"
          hash_changed=true
          if [[ -n "$prev_hash" && "$prev_hash" == "$new_hash" ]]; then
            hash_changed=false
          fi

          dmg_listing="$(7z l -slt "$tmp_dmg")"
          plist_path="$(awk -F' = ' '
            $1 == "Path" && $2 ~ /\/Contents\/Info\.plist$/ {
              print $2
              exit
            }
          ' <<<"$dmg_listing")"

          if [[ -z "$plist_path" ]]; then
            echo "Could not locate Info.plist in upstream DMG" >&2
            exit 1
          fi

          7z x -y "$tmp_dmg" "$plist_path" "-o${tmp_extract_dir}" >/dev/null

          new_codex_version="$(python -c 'import plistlib, sys; info = plistlib.load(open(sys.argv[1], "rb")); version = info.get("CFBundleShortVersionString"); print(version) if version else (_ for _ in ()).throw(SystemExit("CFBundleShortVersionString not found in Info.plist"))' "$tmp_extract_dir/$plist_path")"

          echo "dmg_hash=$new_hash" >> "$GITHUB_OUTPUT"
          echo "codex_version=$new_codex_version" >> "$GITHUB_OUTPUT"
          echo "hash_changed=$hash_changed" >> "$GITHUB_OUTPUT"

          if [[ -n "$prev_codex_version" && "$prev_codex_version" == "$new_codex_version" ]]; then
            echo "release_needed=false" >> "$GITHUB_OUTPUT"

            if [[ "$hash_changed" == "true" ]]; then
              echo "metadata_changed=true" >> "$GITHUB_OUTPUT"
              cp "$tmp_dmg" "$GITHUB_WORKSPACE/Codex.dmg"
              chown builder:builder "$GITHUB_WORKSPACE/Codex.dmg"
              chmod 0644 "$GITHUB_WORKSPACE/Codex.dmg"
              echo "No upstream Codex version change detected (${new_codex_version}), but the DMG hash changed: ${prev_hash} -> ${new_hash}"
            else
              echo "metadata_changed=false" >> "$GITHUB_OUTPUT"
              echo "No upstream Codex version or DMG hash change detected (${new_codex_version})."
            fi
          else
            echo "release_needed=true" >> "$GITHUB_OUTPUT"
            echo "metadata_changed=true" >> "$GITHUB_OUTPUT"
            cp "$tmp_dmg" "$GITHUB_WORKSPACE/Codex.dmg"
            chown builder:builder "$GITHUB_WORKSPACE/Codex.dmg"
            chmod 0644 "$GITHUB_WORKSPACE/Codex.dmg"

            if [[ -z "$prev_codex_version" ]]; then
              echo "No previous Codex version state found: release will proceed with ${new_codex_version}."
            else
              echo "Upstream Codex version changed: ${prev_codex_version} -> ${new_codex_version}"
            fi

            if [[ "$hash_changed" == "true" && -n "$prev_hash" ]]; then
              echo "Upstream DMG hash changed: ${prev_hash} -> ${new_hash}"
            fi
          fi

      - name: Stop when there is nothing to update
        if: steps.detect.outputs.metadata_changed != 'true'
        run: |
          echo "No metadata or release update needed."
          exit 0

      - name: Compute next semantic version
        if: steps.detect.outputs.release_needed == 'true'
        id: version
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          latest_tag="$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)"

          if [[ -z "$latest_tag" ]]; then
            current_pkgver="$(awk -F= '/^pkgver=/{print $2; exit}' PKGBUILD | tr -d "'\"[:space:]")"
            if [[ -z "$current_pkgver" ]]; then
              echo "Unable to read pkgver from PKGBUILD" >&2
              exit 1
            fi
            next_version="$current_pkgver"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"

            if [[ -z "${major:-}" || -z "${minor:-}" || -z "${patch:-}" ]]; then
              echo "Invalid semantic tag format: $latest_tag" >&2
              exit 1
            fi

            next_version="${major}.${minor}.$((patch + 1))"
          fi

          next_tag="v${next_version}"

          echo "next_version=$next_version" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Stop if tag already exists remotely
        if: steps.detect.outputs.release_needed == 'true'
        working-directory: ${{ github.workspace }}
        env:
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${NEXT_TAG}" >/dev/null 2>&1; then
            echo "Tag already exists: ${NEXT_TAG}"
            exit 0
          fi

      - name: Apply release metadata
        working-directory: ${{ github.workspace }}
        env:
          RELEASE_NEEDED: ${{ steps.detect.outputs.release_needed }}
          NEXT_VERSION: ${{ steps.version.outputs.next_version }}
          NEW_DMG_HASH: ${{ steps.detect.outputs.dmg_hash }}
          NEW_CODEX_VERSION: ${{ steps.detect.outputs.codex_version }}
        run: |
          set -euo pipefail

          if [[ "$RELEASE_NEEDED" == "true" ]]; then
            sed -i -E "s/^pkgver=.*/pkgver=${NEXT_VERSION}/" PKGBUILD
            sed -i -E "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          fi

          printf '%s\n' "$NEW_DMG_HASH" > .codex-dmg.sha256
          printf '%s\n' "$NEW_CODEX_VERSION" > .codex-version

          su builder -c "cd '$GITHUB_WORKSPACE' && updpkgsums"
          su builder -c "cd '$GITHUB_WORKSPACE' && makepkg --printsrcinfo > .SRCINFO"

      - name: Commit release metadata
        working-directory: ${{ github.workspace }}
        env:
          RELEASE_NEEDED: ${{ steps.detect.outputs.release_needed }}
          NEW_CODEX_VERSION: ${{ steps.detect.outputs.codex_version }}
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add PKGBUILD .SRCINFO .codex-dmg.sha256 .codex-version

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          if [[ "$RELEASE_NEEDED" == "true" ]]; then
            git commit -m "chore(release): bump version to ${NEXT_TAG#v}"
          else
            git commit -m "chore(metadata): refresh DMG checksum for Codex ${NEW_CODEX_VERSION}"
          fi
          git push origin HEAD:main

      - name: Create and push tag
        if: steps.detect.outputs.release_needed == 'true'
        working-directory: ${{ github.workspace }}
        env:
          NEXT_TAG: ${{ steps.version.outputs.next_tag }}
        run: |
          set -euo pipefail
          git tag -a "${NEXT_TAG}" -m "Release ${NEXT_TAG}"
          git push origin "${NEXT_TAG}"

      - name: Build package
        if: steps.detect.outputs.release_needed == 'true'
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          su builder -c "cd '$GITHUB_WORKSPACE' && makepkg -f --noconfirm"

      - name: Build portable executable artifact
        if: steps.detect.outputs.release_needed == 'true'
        id: artifacts
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail

          PKG_FILE="$(su builder -c "cd '$GITHUB_WORKSPACE' && makepkg --packagelist | head -n1")"
          if [[ -z "$PKG_FILE" || ! -f "$PKG_FILE" ]]; then
            echo "Built package not found" >&2
            exit 1
          fi

          WORK_DIR="$(mktemp -d)"
          trap 'rm -rf "$WORK_DIR"' EXIT

          EXTRACT_DIR="${WORK_DIR}/pkgroot"
          PORTABLE_NAME="codex-app-linux-x86_64"
          PORTABLE_DIR="${WORK_DIR}/${PORTABLE_NAME}"

          mkdir -p "$EXTRACT_DIR" "$PORTABLE_DIR/bin" "$PORTABLE_DIR/lib"

          bsdtar -xpf "$PKG_FILE" -C "$EXTRACT_DIR"
          rm -f "$EXTRACT_DIR/.PKGINFO" "$EXTRACT_DIR/.BUILDINFO" "$EXTRACT_DIR/.MTREE"

          cp -a "$EXTRACT_DIR/usr/bin/codex-app" "$PORTABLE_DIR/bin/codex-app"
          cp -a "$EXTRACT_DIR/usr/lib/codex-app" "$PORTABLE_DIR/lib/codex-app"
          cp -a /usr/lib/electron39 "$PORTABLE_DIR/lib/electron39"

          cat > "${PORTABLE_DIR}/codex-app" <<'EOF_WRAPPER'
          #!/usr/bin/env bash
          set -euo pipefail
          HERE="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export CODEX_APPDIR="${HERE}/lib/codex-app"
          export CODEX_ELECTRON_PATH="${HERE}/lib/electron39/electron"
          exec "${HERE}/bin/codex-app" "$@"
          EOF_WRAPPER

          chmod +x "${PORTABLE_DIR}/codex-app"

          mkdir -p "$GITHUB_WORKSPACE/dist"
          ARCHIVE_FILE="$GITHUB_WORKSPACE/dist/${PORTABLE_NAME}.tar.gz"
          tar -C "$WORK_DIR" -czf "$ARCHIVE_FILE" "$PORTABLE_NAME"

          SHA_FILE="${ARCHIVE_FILE}.sha256"
          sha256sum "$ARCHIVE_FILE" > "$SHA_FILE"

          echo "pkg_file=$ARCHIVE_FILE" >> "$GITHUB_OUTPUT"
          echo "sha_file=$SHA_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifacts
        if: steps.detect.outputs.release_needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: linux-executable-${{ steps.version.outputs.next_tag }}
          path: |
            ${{ steps.artifacts.outputs.pkg_file }}
            ${{ steps.artifacts.outputs.sha_file }}

      - name: Publish GitHub release
        if: steps.detect.outputs.release_needed == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          name: Release ${{ steps.version.outputs.next_tag }}
          files: |
            ${{ steps.artifacts.outputs.pkg_file }}
            ${{ steps.artifacts.outputs.sha_file }}
          generate_release_notes: true
