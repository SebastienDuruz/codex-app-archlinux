name: Verify Arch Packaging Metadata

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-metadata:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    defaults:
      run:
        shell: bash

    steps:
      - name: Install tooling
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm --needed \
            base-devel \
            git \
            pacman-contrib

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure git safety
        run: |
          set -euo pipefail
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Prepare build user
        run: |
          set -euo pipefail
          id -u builder >/dev/null 2>&1 || useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Regenerate metadata
        run: |
          set -euo pipefail
          su builder -c "cd '$GITHUB_WORKSPACE' && updpkgsums"
          su builder -c "cd '$GITHUB_WORKSPACE' && makepkg --printsrcinfo > .SRCINFO"

      - name: Fail if metadata is out of sync
        run: |
          set -euo pipefail
          if ! git diff --quiet -- PKGBUILD .SRCINFO; then
            echo "PKGBUILD/.SRCINFO are out of sync." >&2
            echo "Run: updpkgsums && makepkg --printsrcinfo > .SRCINFO" >&2
            git --no-pager diff -- PKGBUILD .SRCINFO
            exit 1
          fi